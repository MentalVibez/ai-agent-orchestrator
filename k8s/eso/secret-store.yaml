# External Secrets Operator — SecretStore for self-hosted HashiCorp Vault.
#
# This store uses Kubernetes Service Account auth (no static tokens).
# The SA is bound to Vault role "ai-agent-orchestrator" which has read-only
# access to secret/ai-agent-orchestrator in KV v2.
#
# All secrets stay within corporate infrastructure — no cloud dependency.
#
# Apply after ESO is installed:
#   kubectl apply -f k8s/eso/secret-store.yaml
#
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: ai-agent-orchestrator
spec:
  provider:
    vault:
      # Internal Vault server — data never leaves the company network
      server: "https://vault.internal:8200"
      path: "secret"       # KV v2 mount path
      version: "v2"
      auth:
        kubernetes:
          # Kubernetes auth — authenticates using the pod's projected SA token.
          # No static Vault tokens stored anywhere.
          mountPath: "kubernetes"
          role: "ai-agent-orchestrator"
          serviceAccountRef:
            name: ai-agent-orchestrator  # SA from rbac.yaml
