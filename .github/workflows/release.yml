name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and push the versioned Docker image first
  docker-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=AI Agent Orchestrator
            org.opencontainers.image.description=Multi-agent AI orchestrator for IT diagnostics

      - name: Build and push versioned Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create the GitHub release with Docker image reference in the notes
  github-release:
    runs-on: ubuntu-latest
    needs: docker-release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Image

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.docker-release.outputs.image-tag }}
            ```

            Pin to the immutable digest for production:
            ```
            ghcr.io/${{ github.repository }}@${{ needs.docker-release.outputs.image-digest }}
            ```

            ## K8s Rollout

            ```bash
            kubectl set image deployment/ai-agent-orchestrator \
              orchestrator=ghcr.io/${{ github.repository }}:${{ needs.docker-release.outputs.image-tag }} \
              -n ai-agent-orchestrator
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
