# External Secrets Operator — ExternalSecret pulls all orchestrator secrets
# from self-hosted HashiCorp Vault and creates/syncs the K8s Secret
# "orchestrator-secrets" every hour.
#
# Apply after secret-store.yaml:
#   kubectl apply -f k8s/eso/external-secret.yaml
#
# Verify:
#   kubectl get externalsecret -n ai-agent-orchestrator
#   # Should show READY=True and STATUS=SecretSynced
#
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: orchestrator-secrets
  namespace: ai-agent-orchestrator
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-secret-store
    kind: SecretStore
  target:
    name: orchestrator-secrets       # Name of the K8s Secret to create/update
    creationPolicy: Owner            # ESO owns this Secret; deleting ESO object deletes it
  data:
    - secretKey: API_KEY
      remoteRef:
        key: secret/ai-agent-orchestrator
        property: api_key
    - secretKey: DATABASE_URL
      remoteRef:
        key: secret/ai-agent-orchestrator
        property: database_url
    - secretKey: METRICS_TOKEN
      remoteRef:
        key: secret/ai-agent-orchestrator
        property: metrics_token
    - secretKey: WEBHOOK_SECRET
      remoteRef:
        key: secret/ai-agent-orchestrator
        property: webhook_secret
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: secret/ai-agent-orchestrator
        property: aws_access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: secret/ai-agent-orchestrator
        property: aws_secret_access_key
