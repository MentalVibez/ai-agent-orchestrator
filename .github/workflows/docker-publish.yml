name: Publish Docker Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  # Allow triggering manually (useful for re-publishing after a workflow fix)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables layer caching and multi-platform builds

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Push :latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # Push :main-<sha7> on push to main (traceable, immutable)
            type=sha,prefix=main-,enable={{is_default_branch}}
            # Push :v1.2.3 and :1.2 on semver tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=AI Agent Orchestrator
            org.opencontainers.image.description=Multi-agent AI orchestrator for IT diagnostics
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Image pushed successfully:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
          echo "Digest: ${{ steps.build-push.outputs.digest }}"
