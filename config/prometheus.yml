global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: ai-agent-orchestrator
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    # Use METRICS_TOKEN if set; falls back to API_KEY otherwise
    authorization:
      type: Bearer
      credentials: "${METRICS_TOKEN}"
