name: Backup Restore Gate

on:
  schedule:
    - cron: "0 4 * * *"  # Daily 04:00 UTC
  workflow_dispatch:

jobs:
  backup-restore:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orchestrator
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/orchestrator
      BACKUP_DIR: .ci-backups
      RETENTION_DAYS: "30"
      CONFIRM: "yes"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PostgreSQL client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply DB migrations
        run: alembic upgrade head

      - name: Seed deterministic backup marker row
        run: |
          set -euo pipefail
          psql "${DATABASE_URL}" <<'SQL'
          INSERT INTO runs (run_id, goal, agent_profile_id, status)
          VALUES ('backup-restore-marker-run', 'backup marker row', 'default', 'completed')
          ON CONFLICT (run_id) DO NOTHING;
          SQL

          count=$(psql "${DATABASE_URL}" -t -A -c "SELECT COUNT(*) FROM runs WHERE run_id='backup-restore-marker-run';")
          test "${count}" = "1"

      - name: Create backup archive
        run: |
          set -euo pipefail
          bash scripts/backup.sh
          ls -la "${BACKUP_DIR}"
          latest=$(ls -1t "${BACKUP_DIR}"/orchestrator_*.dump.gz | head -n1)
          echo "LATEST_BACKUP=${latest}" >> "$GITHUB_ENV"

      - name: Mutate DB after backup (delete marker)
        run: |
          set -euo pipefail
          psql "${DATABASE_URL}" -c "DELETE FROM runs WHERE run_id='backup-restore-marker-run';"
          count=$(psql "${DATABASE_URL}" -t -A -c "SELECT COUNT(*) FROM runs WHERE run_id='backup-restore-marker-run';")
          test "${count}" = "0"

      - name: Restore from backup and verify marker recovered
        run: |
          set -euo pipefail
          bash scripts/restore.sh "${LATEST_BACKUP}"
          count=$(psql "${DATABASE_URL}" -t -A -c "SELECT COUNT(*) FROM runs WHERE run_id='backup-restore-marker-run';")
          echo "Recovered marker rows: ${count}"
          test "${count}" = "1"

      - name: Upload backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-restore-gate-${{ github.run_number }}-${{ github.run_attempt }}
          path: .ci-backups/
          retention-days: 14
