version: '3.8'

services:
  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ai-agent-orchestrator-db
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=orchestrator
      - POSTGRES_USER=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - orchestrator-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-agent-orchestrator
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/orchestrator
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      # Mount config files (read-only)
      - ./config:/app/config:ro
    networks:
      - orchestrator-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Distributed Tracing ─────────────────────────────────────────────────────
  # Jaeger all-in-one: collects OTLP traces from the API and provides a UI.
  # Access the UI at http://localhost:16686
  # Set OTEL_ENABLED=true in .env to enable trace export.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: ai-agent-orchestrator-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC (used by the API)
      - "4318:4318"     # OTLP HTTP (alternative)
    networks:
      - orchestrator-network

  # ── Prometheus ──────────────────────────────────────────────────────────────
  # Scrapes metrics from the API and provides the data source for Grafana.
  # Access at http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ai-agent-orchestrator-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - orchestrator-network
    depends_on:
      - api

  # ── Alertmanager ────────────────────────────────────────────────────────────
  # Routes Prometheus alerts to PagerDuty, email, and webhooks.
  # Configure receivers via environment variables (see config/alertmanager.yml).
  # Access the UI at http://localhost:9093
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ai-agent-orchestrator-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    environment:
      - PAGERDUTY_SERVICE_KEY=${PAGERDUTY_SERVICE_KEY:-}
      - SMTP_SMARTHOST=${SMTP_SMARTHOST:-smtp.example.com:587}
      - SMTP_FROM=${SMTP_FROM:-alerts@yourdomain.com}
      - SMTP_AUTH_USERNAME=${SMTP_AUTH_USERNAME:-}
      - SMTP_AUTH_PASSWORD=${SMTP_AUTH_PASSWORD:-}
      - ALERT_EMAIL_OPS=${ALERT_EMAIL_OPS:-ops@yourdomain.com}
      - ALERT_EMAIL_FINANCE=${ALERT_EMAIL_FINANCE:-finance@yourdomain.com}
      - ALERTMANAGER_WEBHOOK_URL=${ALERTMANAGER_WEBHOOK_URL:-http://localhost:8000/api/v1/webhooks/alertmanager}
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - orchestrator-network

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Pre-provisioned with the orchestrator dashboard and Prometheus datasource.
  # Access at http://localhost:3000 (default login: admin / admin)
  # Change the password on first login or set GF_SECURITY_ADMIN_PASSWORD in .env.
  grafana:
    image: grafana/grafana:10.4.0
    container_name: ai-agent-orchestrator-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_ALERTING_ENABLED=false          # Use Alertmanager instead
      - GF_UNIFIED_ALERTING_ENABLED=false
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - orchestrator-network
    depends_on:
      - api

volumes:
  postgres-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:

networks:
  orchestrator-network:
    driver: bridge
