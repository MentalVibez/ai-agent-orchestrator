name: Publish Docker Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  # Allow triggering manually (useful for re-publishing after a workflow fix)
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # Required to push to GHCR
      id-token: write      # Required for keyless cosign signing (OIDC)
      attestations: write  # Required to attach SBOM attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Buildx enables layer caching and multi-platform builds

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Push :latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # Push :main-<sha7> on push to main (traceable, immutable)
            type=sha,prefix=main-,enable={{is_default_branch}}
            # Push :v1.2.3 and :1.2 on semver tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=AI Agent Orchestrator
            org.opencontainers.image.description=Multi-agent AI orchestrator for IT diagnostics
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image digest
        run: |
          echo "Image pushed successfully:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n'
          echo "Digest: ${{ steps.push.outputs.digest }}"

      # ── Supply Chain Security ───────────────────────────────────────────────
      # Sign the image with cosign using GitHub's OIDC token (keyless signing).
      # Signatures are stored in the same registry alongside the image.
      # Verify with: cosign verify --certificate-identity-regexp=github.com/<owner> \
      #                            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
      #                            ghcr.io/<owner>/ai-agent-orchestrator@<digest>
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"

      # Generate an SBOM (Software Bill of Materials) in SPDX-JSON format
      # and attach it to the image as a cosign attestation.
      # This lets downstream tools audit the exact packages in the image.
      - name: Generate SBOM with syft
        uses: anchore/sbom-action@v0
        with:
          image: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attach SBOM attestation to image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}"

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json
          retention-days: 90

      # ── SLSA Level 2 Provenance ─────────────────────────────────────────────
      # Generate a signed SLSA Build Provenance attestation meeting Level 2:
      #   L1 – provenance exists (generated in CI)
      #   L2 – provenance is signed; build platform is a hosted service (GHA)
      #
      # The attestation is stored in GitHub's attestation store (tied to the repo)
      # and pushed alongside the image in the registry.
      #
      # Verify with:
      #   gh attestation verify oci://<image>@<digest> --owner <owner>
      #
      # Download all attestations:
      #   gh attestation download oci://<image>@<digest> --owner <owner>
      - name: Generate SLSA Level 2 provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
