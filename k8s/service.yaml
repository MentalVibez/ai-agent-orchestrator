apiVersion: v1
kind: Service
metadata:
  name: ai-agent-orchestrator
  namespace: ai-agent-orchestrator
  labels:
    app: ai-agent-orchestrator
spec:
  # ClusterIP — external traffic enters via the Ingress controller, not directly.
  # The Ingress handles TLS termination, rate limiting, and host-based routing.
  #
  # To test on a bare cluster without an Ingress controller, temporarily change
  # this to LoadBalancer to obtain a public IP directly.
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: ai-agent-orchestrator
