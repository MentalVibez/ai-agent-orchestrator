apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-agent-orchestrator.fullname" . }}
  namespace: {{ include "ai-agent-orchestrator.namespace" . }}
  labels:
    {{- include "ai-agent-orchestrator.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ai-agent-orchestrator.fullname" . }}
  namespace: {{ include "ai-agent-orchestrator.namespace" . }}
  labels:
    {{- include "ai-agent-orchestrator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ai-agent-orchestrator.fullname" . }}
  namespace: {{ include "ai-agent-orchestrator.namespace" . }}
  labels:
    {{- include "ai-agent-orchestrator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ai-agent-orchestrator.fullname" . }}
    namespace: {{ include "ai-agent-orchestrator.namespace" . }}
roleRef:
  kind: Role
  name: {{ include "ai-agent-orchestrator.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
