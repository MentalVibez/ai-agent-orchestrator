apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-config
  labels:
    app: ai-agent-orchestrator
data:
  APP_NAME: "AI Agent Orchestrator"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  HOST: "0.0.0.0"
  PORT: "8000"
  CORS_ORIGINS: "https://yourdomain.com,https://www.yourdomain.com"
  LLM_PROVIDER: "bedrock"
  LLM_MODEL: "anthropic.claude-3-haiku-20240307-v1:0"
  LLM_TEMPERATURE: "0.7"
  LLM_MAX_TOKENS: "4096"
  AWS_REGION: "us-east-1"
  RATE_LIMIT_PER_MINUTE: "60"
  REQUIRE_API_KEY: "true"
  # DATABASE_URL must NOT be set here — it contains credentials and must come
  # from the orchestrator-secrets Secret (see secret.yaml.example).
  # SQLite is not suitable for multi-replica K8s deployments (single-writer,
  # no horizontal scaling, data lost when PVC is evicted).
  # Use: DATABASE_URL=postgresql://user:pass@postgres-service:5432/orchestrator

