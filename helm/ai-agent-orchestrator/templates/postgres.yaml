{{- if and .Values.postgresql.enabled .Values.postgresql.internal }}
# Self-hosted PostgreSQL — all data stays within the cluster (data residency compliant).
# For HIPAA: ensure the PersistentVolume uses an encrypted StorageClass.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: {{ include "ai-agent-orchestrator.namespace" . }}
  labels:
    {{- include "ai-agent-orchestrator.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgresql.persistence.storageClass }}
  storageClassName: {{ .Values.postgresql.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ include "ai-agent-orchestrator.namespace" . }}
  labels:
    app: postgres
    {{- include "ai-agent-orchestrator.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # PG needs to write its data dir
            capabilities:
              drop: ["ALL"]
              add: ["SETUID", "SETGID"]   # Required for PG initdb
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: {{ include "ai-agent-orchestrator.namespace" . }}
  labels:
    app: postgres
    {{- include "ai-agent-orchestrator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
{{- end }}
