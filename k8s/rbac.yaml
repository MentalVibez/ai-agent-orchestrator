---
# ServiceAccount used by the orchestrator pods.
# automountServiceAccountToken is disabled — the app does not need K8s API access.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agent-orchestrator
  namespace: ai-agent-orchestrator
  labels:
    app: ai-agent-orchestrator
automountServiceAccountToken: false

---
# Minimal Role — grants only the absolute minimum permissions required.
# The app reads config from ConfigMap env injection (no API call needed).
# Secrets are injected as environment variables by the deployment (no API call needed).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-agent-orchestrator
  namespace: ai-agent-orchestrator
  labels:
    app: ai-agent-orchestrator
rules:
  # No rules required — all config arrives via env vars from ConfigMap/Secret refs.
  # This empty rules list is intentional: principle of least privilege.
  []

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-agent-orchestrator
  namespace: ai-agent-orchestrator
  labels:
    app: ai-agent-orchestrator
subjects:
  - kind: ServiceAccount
    name: ai-agent-orchestrator
    namespace: ai-agent-orchestrator
roleRef:
  kind: Role
  name: ai-agent-orchestrator
  apiGroup: rbac.authorization.k8s.io
