name: Nightly Load Test

on:
  schedule:
    - cron: "0 3 * * *"  # 03:00 UTC nightly
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: read

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt locust

      - name: Disable MCP servers for CI startup
        run: |
          python - <<'PY'
          import yaml
          p = 'config/mcp_servers.yaml'
          with open(p, 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f) or {}
          for cfg in (data.get('mcp_servers') or {}).values():
              if isinstance(cfg, dict):
                  cfg['enabled'] = False
          with open(p, 'w', encoding='utf-8') as f:
              yaml.safe_dump(data, f, sort_keys=False)
          PY

      - name: Start app (SQLite, no LLM — smoke mode)
        env:
          DATABASE_URL: sqlite:///./load_test.db
          LLM_PROVIDER: ollama
          OLLAMA_BASE_URL: http://localhost:11434
          REQUIRE_API_KEY: "true"
          API_KEY: load-test-key
          DEBUG: "false"
          WEBHOOK_REQUIRE_AUTH: "false"
          METRICS_TOKEN: load-metrics-token
          WEBHOOK_SECRET: load-webhook-secret
        run: |
          alembic upgrade head
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/v1/health >/dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          cat app.log || true
          exit 1

      - name: Run load test (headless, 60s) with SLA enforcement
        env:
          LOAD_TEST_API_KEY: load-test-key
        run: |
          mkdir -p tests/load/results
          # --exit-code-on-error 1: exit 1 on HTTP failures
          # The @events.quitting listener in locustfile.py also sets
          # environment.process_exit_code = 1 when SLA thresholds are breached.
          locust -f tests/load/locustfile.py \
            --host http://localhost:8000 \
            --users 10 \
            --spawn-rate 2 \
            --run-time 60s \
            --headless \
            --csv tests/load/results/nightly \
            --exit-code-on-error 1

      - name: Print load test summary
        if: always()
        run: |
          if [ -f tests/load/results/nightly_stats.csv ]; then
            echo "=== Load Test Summary ==="
            cat tests/load/results/nightly_stats.csv
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          # Include date in artifact name so results are preserved historically
          name: load-test-results-${{ github.run_number }}-${{ github.run_attempt }}
          path: tests/load/results/
          retention-days: 90
