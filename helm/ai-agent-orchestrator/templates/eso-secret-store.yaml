{{- if .Values.externalSecrets.enabled }}
# ClusterSecretStore — points to self-hosted HashiCorp Vault.
# All secrets are fetched from internal Vault; nothing leaves the corporate network.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: {{ include "ai-agent-orchestrator.namespace" . }}
  labels:
    {{- include "ai-agent-orchestrator.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.vault.server | quote }}
      path: {{ "secret" | quote }}
      version: {{ .Values.externalSecrets.vault.version | quote }}
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: {{ .Values.externalSecrets.vault.role | quote }}
          serviceAccountRef:
            name: {{ include "ai-agent-orchestrator.fullname" . }}
{{- end }}
